appId: com.gamelord.app
productName: GameLord
copyright: Copyright © 2026 GameLord

directories:
  buildResources: build
  output: dist

files:
  - out/**/*

asarUnpack:
  - out/**/*.node

extraResources:
  - from: native/build/Release/gamelord_libretro.node
    to: gamelord_libretro.node
  - from: resources/homebrew
    to: homebrew

mac:
  category: public.app-category.games
  target:
    - dmg
  # No code signing yet — deferred until Apple Developer cert is obtained
  identity: null

dmg:
  title: GameLord
  iconSize: 100
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - nsis
    - zip

linux:
  target:
    - deb
    - rpm
    - AppImage

# electronFuses — not supported by electron-builder v25; configure via
# @electron/fuses afterPack hook when code signing is added.
