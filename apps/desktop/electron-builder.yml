appId: com.gamelord.app
productName: GameLord
copyright: Copyright © 2026 GameLord

directories:
  buildResources: build
  output: dist

files:
  - out/**/*

asarUnpack:
  - out/**/*.node

extraResources:
  - from: native/build/Release/gamelord_libretro.node
    to: gamelord_libretro.node
  - from: resources/homebrew
    to: homebrew

afterPack: build/afterPack.js

mac:
  category: public.app-category.games
  icon: build/icon.icns
  target:
    - dmg
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.plist
  entitlementsInherit: entitlements.inherit.plist
  notarize: true

dmg:
  title: GameLord
  iconSize: 100
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 210
    - x: 410
      y: 210
      type: link
      path: /Applications

win:
  target:
    - nsis
    - zip

linux:
  target:
    - deb
    - rpm
    - AppImage
