<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>GameLord</title>
    <style>
      /* Inline critical styles to prevent FOUC on cold launch.
         The dark background matches the app's default theme so the
         window never flashes white before CSS/JS load. */
      body { margin: 0; background: #0a0a0a; }
      #root { opacity: 0; transition: opacity 200ms ease; }
      #root.mounted { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
