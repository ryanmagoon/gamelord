version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "09:00"
      timezone: America/New_York
    groups:
      npm_and_yarn:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
    commit-message:
      prefix: "chore(deps):"
    labels:
      - dependencies
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "09:00"
      timezone: America/New_York
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - dependencies
